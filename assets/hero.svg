<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 360" role="img" aria-labelledby="title desc">
  <title id="title">VaultLayer — files stay yours, agents get a database</title>
  <desc id="desc">A calm diagram showing Markdown vault files flowing into a local shadow database, retrieval layer, agents, and viewer.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#a78bfa"/>
    </linearGradient>
    <style>
      .label{font:700 30px ui-sans-serif,system-ui,-apple-system,Segoe UI,sans-serif;fill:#f8fafc}
      .small{font:500 18px ui-sans-serif,system-ui,-apple-system,Segoe UI,sans-serif;fill:#cbd5e1}
      .tiny{font:600 15px ui-sans-serif,system-ui,-apple-system,Segoe UI,sans-serif;fill:#93c5fd}
      .card{fill:#111827;stroke:#334155;stroke-width:2;rx:22}
      .accent{stroke:url(#accent);stroke-width:5;fill:none;stroke-linecap:round;stroke-linejoin:round}
    </style>
  </defs>
  <rect width="1000" height="360" rx="34" fill="url(#bg)"/>
  <circle cx="830" cy="55" r="120" fill="#1e293b" opacity="0.45"/>
  <circle cx="105" cy="305" r="105" fill="#312e81" opacity="0.28"/>

  <text x="58" y="72" class="label">VaultLayer</text>
  <text x="58" y="104" class="small">Your vault stays files. Agents get a database.</text>

  <rect x="62" y="150" width="180" height="118" class="card"/>
  <text x="92" y="196" class="small">Markdown</text>
  <text x="92" y="226" class="tiny">files • links • tags</text>

  <path d="M262 209 H355" class="accent"/>
  <path d="M340 194 L360 209 L340 224" class="accent"/>

  <rect x="380" y="130" width="220" height="158" class="card"/>
  <text x="418" y="178" class="small">Shadow DB</text>
  <text x="418" y="210" class="tiny">SQLite / libSQL</text>
  <text x="418" y="238" class="tiny">FTS • vectors • graph</text>

  <path d="M620 209 H713" class="accent"/>
  <path d="M698 194 L718 209 L698 224" class="accent"/>

  <rect x="742" y="112" width="196" height="86" class="card"/>
  <text x="777" y="148" class="small">Agents</text>
  <text x="777" y="174" class="tiny">CLI • MCP • context</text>

  <rect x="742" y="222" width="196" height="86" class="card"/>
  <text x="777" y="258" class="small">Viewer</text>
  <text x="777" y="284" class="tiny">fast human UI</text>

  <path d="M152 283 C238 330 418 335 516 298" stroke="#475569" stroke-width="2" fill="none" stroke-dasharray="7 9"/>
  <text x="358" y="329" class="tiny">runtime indexes live outside the repo</text>
</svg>
